name: Detect Changes
description: Determine which services have changed and need to be built/tested

outputs:
  affected_services:
    description: JSON array of affected service names
    value: ${{ steps.detect.outputs.affected_services }}
  has_changes:
    description: Whether any services were affected
    value: ${{ steps.detect.outputs.has_changes }}

runs:
  using: composite
  steps:
    - name: Detect changed services
      id: detect
      shell: bash
      run: |
        ALL_SERVICES='["auth-service","user-service","order-service","product-service","notification-service"]'

        # Determine the diff range
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
        else
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.event.after }}"
        fi

        # Get list of changed files
        CHANGED_FILES=$(git diff --name-only "${BASE_SHA}...${HEAD_SHA}" 2>/dev/null || echo "")

        # If we can't determine changes (e.g. first push), rebuild all
        if [ -z "$CHANGED_FILES" ]; then
          echo "affected_services=${ALL_SERVICES}" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Could not determine diff — marking all services as affected"
          exit 0
        fi

        # Check if shared packages or root config changed
        SHARED_CHANGED=$(echo "$CHANGED_FILES" | grep -E '^(packages/|pnpm-lock\.yaml|pnpm-workspace\.yaml|turbo\.json|tsconfig\.json)' || true)

        if [ -n "$SHARED_CHANGED" ]; then
          echo "affected_services=${ALL_SERVICES}" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Shared files changed — all services affected"
          exit 0
        fi

        # Check each service individually
        AFFECTED=()
        for SERVICE in auth-service user-service order-service product-service notification-service; do
          if echo "$CHANGED_FILES" | grep -q "^apps/${SERVICE}/"; then
            AFFECTED+=("\"${SERVICE}\"")
          fi
        done

        if [ ${#AFFECTED[@]} -eq 0 ]; then
          echo "affected_services=[]" >> "$GITHUB_OUTPUT"
          echo "has_changes=false" >> "$GITHUB_OUTPUT"
          echo "No service changes detected"
        else
          SERVICES_JSON="[$(IFS=,; echo "${AFFECTED[*]}")]"
          echo "affected_services=${SERVICES_JSON}" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Affected services: ${SERVICES_JSON}"
        fi
