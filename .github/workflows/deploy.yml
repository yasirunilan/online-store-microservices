name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - prod
      services:
        description: Comma-separated services to deploy (leave empty for auto-detect)
        required: false
        type: string

concurrency:
  group: deploy-${{ inputs.environment || 'dev' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      affected_services: ${{ steps.manual.outputs.affected_services || steps.auto.outputs.affected_services }}
      has_changes: ${{ steps.manual.outputs.has_changes || steps.auto.outputs.has_changes }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "environment=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Parse manual service input
        if: inputs.services != ''
        id: manual
        shell: bash
        run: |
          IFS=',' read -ra SERVICES <<< "${{ inputs.services }}"
          JSON_ARRAY="["
          FIRST=true
          for SVC in "${SERVICES[@]}"; do
            SVC=$(echo "$SVC" | xargs)  # trim whitespace
            if [ "$FIRST" = true ]; then
              JSON_ARRAY+="\"${SVC}\""
              FIRST=false
            else
              JSON_ARRAY+=",\"${SVC}\""
            fi
          done
          JSON_ARRAY+="]"
          echo "affected_services=${JSON_ARRAY}" >> "$GITHUB_OUTPUT"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Auto-detect changes
        if: inputs.services == ''
        id: auto
        uses: ./.github/actions/detect-changes

  quality-gate:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Lint, Typecheck & Test
        run: pnpm turbo run lint typecheck test

  docker-build-push:
    needs: [detect-changes, quality-gate]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.affected_services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/online-store-${{ matrix.service }}:${{ github.sha }}
            ${{ steps.ecr-login.outputs.registry }}/online-store-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    needs: [detect-changes, docker-build-push]
    if: needs.detect-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.detect-changes.outputs.environment }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.affected_services) }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition online-store-${{ matrix.service }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render new image in task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ matrix.service }}
          image: ${{ steps.ecr-login.outputs.registry }}/online-store-${{ matrix.service }}:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          service: online-store-${{ matrix.service }}
          cluster: online-store-${{ needs.detect-changes.outputs.environment }}
          wait-for-service-stability: true
          wait-for-minutes: 10
